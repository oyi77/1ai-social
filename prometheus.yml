global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: '1ai-social'
    environment: 'production'

scrape_configs:
  - job_name: '1ai-social'
    static_configs:
      - targets: ['localhost:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']
    scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  []

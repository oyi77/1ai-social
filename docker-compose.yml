version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 1ai-social-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://1ai:1ai_password@postgres:5432/1ai_social
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - 1ai-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: 1ai-social-postgres
    environment:
      - POSTGRES_USER=1ai
      - POSTGRES_PASSWORD=1ai_password
      - POSTGRES_DB=1ai_social
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U 1ai"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - 1ai-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: 1ai-social-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - 1ai-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  1ai-network:
    driver: bridge
